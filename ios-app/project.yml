name: BlindTest
options:
  bundleIdPrefix: com.blindtest
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  BlindTest:
    type: application
    platform: iOS
    sources:
      - path: BlindTest
    info:
      path: BlindTest/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blindtest.app
        INFOPLIST_FILE: BlindTest/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    dependencies:
      - package: SocketIO
        product: SocketIO
      - package: KeychainAccess
        product: KeychainAccess

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.1"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
